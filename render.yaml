services:
  - type: web
    name: news-dashboard-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: news-dashboard-api
          property: host
    healthCheckPath: /health
    autoDeploy: true
